name: Backend CI

on:
  push:
    branches: [main]   # swap to [main] when ready for production flow
  pull_request:
    branches: [main]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Apply database migrations
        if: github.event_name == 'push'
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to staging
        # Only deploy on push (not on pull_request), and only when tests pass
        if: github.event_name == 'push'
        run: curl -f -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK_BACKEND }}"
