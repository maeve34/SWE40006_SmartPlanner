name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'smartplanner-src/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'smartplanner-src/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: smartplanner-src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build
        if: github.event_name == 'push'
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.RENDER_BACKEND_URL }}

      - name: Deploy to staging
        if: github.event_name == 'push'
        run: curl -f -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK_FRONTEND }}"

      - name: Verify deployment
        if: github.event_name == 'push'
        run: |
          echo "Waiting for Render to spin up..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.RENDER_FRONTEND_URL }})
            if [ "$STATUS" = "200" ]; then
              echo "Frontend deployment live!"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Deployment did not become healthy in time"
          exit 1
